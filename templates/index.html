<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Image Captioning</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            margin: 0;
        }
        .box {
            width: min(90%, 480px);
            margin: auto;
            padding: 30px;
            background: #222;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        input {
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            background: #00ff88;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        img {
            width: 100%;
            max-width: 300px;
            margin-top: 20px;
            border-radius: 10px;
        }
        .error {
            color: #ff7b7b;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>AI Image Captioning</h1>
        <form action="/predict" method="POST" enctype="multipart/form-data">
            <input type="file" name="image" required />
            <br />
            <button type="submit">Generate Caption</button>
        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        {% if image %}
            <img src="{{ image }}" alt="Uploaded preview" />
            <h2>{{ caption }}</h2>
        {% endif %}
    </div>
</body>
</html>
